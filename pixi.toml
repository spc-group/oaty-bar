[workspace]
authors = ["Mark Wolfman <wolfman@anl.gov>"]
channels = ["conda-forge"]
name = "oaty-bar"
platforms = ["linux-64"]

[tasks]

[dependencies]
python = ">=3.14.4,<3.15"

[pypi-dependencies]
oaty-bar = { path = ".", editable = true }
tiled = { version = ">=0.2.9, <0.3", extras = ["client"] }
h5py = ">=3.16.0, <4"
hdf5plugin = ">=6.0.0, <7"

[environments]
dev = { features = ["dev"] }

[feature.dev.pypi-dependencies]
ruff = ">=0.15.11, <0.16"
pytest = "*"
black = ">=26.3.1, <27"
isort = ">=8.0.1, <9"
mypy = ">=1.20.2, <2"
sphinx = ">=9.1.0, <10"
sphinx-rtd-theme = ">=3.1.0, <4"
pytest-asyncio = ">=1.3.0, <2"
nexusformat = ">=2.0.2, <3"
tiled = { version = ">=0.2.9, <0.3", extras = ["server"] }
pytest-mock = ">=3.15.1, <4"
ipython = ">=9.12.0, <10"

[feature.dev.tasks]
test-all = [
    {task = "lint" },
    {task = "format", args = ["--check"] },
    {task = "sort-imports", args = ["--check"] },
    {task = "check-types" },
    {task = "tests" },
]
lint-all = [
    {task = "lint", args = ["--fix"]},
    {task = "format"},
    {task = "sort-imports"},
]
check-types = "mypy"
make-docs = "make html --directory=docs/"
tests = "pytest -Werror"

[feature.dev.tasks.lint]
args = [
     { arg = "fix", default = "" },
]
cmd = "ruff check {{ fix }}"

[feature.dev.tasks.sort-imports]
args = [
     { arg = "check_flag", default = "" },
]
cmd = "isort src/ tests/ {{ check_flag }}"

[feature.dev.tasks.format]
args = [
     { arg = "check_flag", default = "" },
]
cmd = "black src/ tests/ {{ check_flag }}"
